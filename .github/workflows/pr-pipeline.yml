name: PR Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "18"
      run_tests: true

  pr-summary:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - run: echo "PR checks passed for branch ${{ github.head_ref }}"