name: Main Pipeline

on:
  push:
    branches: [main]


permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "18"

  docker:
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: warriorr/app
    secrets:
      docker_username: ${{ vars.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


  scan:
    needs: docker
    runs-on: ubuntu-latest

    steps:

      - name: Debug output
        run: echo "IMAGE = ${{ needs.docker.outputs.image_latest }}"

      - name: Scan Docker Image
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.20.0
        with:
            image-ref: ${{ needs.docker.outputs.image_latest }} 
            format: sarif
            severity: CRITICAL
            exit-code: 1
            output: trivy-results.sarif
        env:
            continued-on-error: true

      - uses: github/codeql-action/upload-sarif@v3
        with:
            sarif_file: trivy-results.sarif

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy
        run: |
          echo "Deploying:"
          echo "Latest: ${{ needs.docker.outputs.image_latest }}"
          echo "SHA: ${{ needs.docker.outputs.image_sha }}"