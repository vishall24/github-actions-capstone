name: Health Check

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/app:latest

      - name: Run container
        run: docker run -d -p 3000:3000 --name app ${{ secrets.DOCKER_USERNAME }}/app:latest

      - name: Wait
        run: sleep 5

      - name: Test app
        id: test
        run: |
          if curl -f http://localhost:3000; then
            echo "STATUS=PASSED" >> $GITHUB_ENV
          else
            echo "STATUS=FAILED" >> $GITHUB_ENV
          fi

      - name: Summary
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY

      - run: docker stop app && docker rm app